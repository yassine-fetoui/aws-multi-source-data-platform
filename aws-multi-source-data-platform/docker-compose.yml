version: "3.9"

services:

  # ── Zookeeper (required by Kafka) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"

  # ── Kafka broker (local substitute for MSK) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_ENABLE_IDEMPOTENCE:               "true"

  # ── Schema Registry ────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on: [kafka]
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME:                       schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS:    kafka:9092

  # ── MinIO (local substitute for S3) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  # ── PostgreSQL (local substitute for RDS) ──────────────────────────────────
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-dataplatform}
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Airflow ────────────────────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.0
    depends_on: [postgres, kafka]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR:                     LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:         postgresql+psycopg2://admin:changeme@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY:                   ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY:              ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES:                "false"
      MSK_BOOTSTRAP_SERVERS:                       kafka:9092
      SCHEMA_REGISTRY_URL:                         http://schema-registry:8081
      S3_RAW_BUCKET:                               data-platform-raw-dev
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
                 --firstname Yassine --lastname Fetoui
                 --role Admin --email yfetoui123@gmail.com &&
               airflow webserver"

  # ── Order event generator ──────────────────────────────────────────────────
  order-producer:
    build:
      context: kafka/producers
      dockerfile: Dockerfile
    depends_on: [kafka, schema-registry]
    environment:
      MSK_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL:   http://schema-registry:8081
      KAFKA_TOPIC:           orders
      EVENTS_PER_SECOND:     "100"

volumes:
  minio_data:
  postgres_data:
