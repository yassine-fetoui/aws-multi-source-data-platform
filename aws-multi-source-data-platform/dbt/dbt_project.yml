name: aws_data_platform
version: "1.0.0"
config-version: 2

profile: aws_data_platform

model-paths:   ["models"]
snapshot-paths: ["snapshots"]
test-paths:    ["tests"]
macro-paths:   ["macros"]
analysis-paths: ["analyses"]

target-path:   "target"
clean-targets: ["target", "dbt_packages"]

models:
  aws_data_platform:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: ephemeral

    marts:
      +materialized: incremental
      +schema: marts
      +post-hook:
        - "{{ assert_row_count(min_rows=1) }}"

snapshots:
  aws_data_platform:
    +target_schema: snapshots
    +strategy: check
    +unique_key: "{{ model.name.replace('snap_', '') }}_id"

seeds:
  aws_data_platform:
    +schema: seeds

vars:
  # Incremental load lookback window (hours) — handles late-arriving events
  incremental_lookback_hours: 2
  # Pipeline version — used in audit columns
  pipeline_version: "1.0.0"
